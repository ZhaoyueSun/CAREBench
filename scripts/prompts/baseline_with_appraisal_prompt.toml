[meta]
version = "0.1"

[appraisals.dimension_to_statement]
"relevance.general" = "I {opinion} that this situation matters to me."
"relevance.urgency" = "I {opinion} that I need to do something about this situation right away."
"relevance.goals" = "I {opinion} that this situation relates to my goals and plans."
"relevance.bodily motives" = "I {opinion} that this situation relates to my physical well-being."
"relevance.social motives" = "I {opinion} that this situation involves people who matter to me."
"relevance.identity motives" = "I {opinion} that this situation concerns who I am and what I stand for."
"certainty.construal" = "I {opinion} that it is clear to me what is going on in this situation."
"certainty.outlook" = "I {opinion} that I know what will come next in this situation."
"certainty.predictability" = "I {opinion} that I saw this situation coming."
"certainty.novelty" = "I {opinion} that this is a new kind of situation for me."
"congruence.general" = "I {opinion} that this is a good situation."
"congruence.outlook" = "I {opinion} that this situation will get better with time."
"congruence.positive prediction error" = "I {opinion} that this situation is better than I expected."
"congruence.negative prediction error" = "I {opinion} that this situation is worse than I expected."
"control.general" = "I {opinion} that this situation is under my control."
"control.select" = "I {opinion} that I can decide whether to stay in this situation or leave it."
"control.vicarious" = "I {opinion} that Someone can handle this situation for me."
"control.effortful" = "I {opinion} that I have to exert effort in this situation."
"accountability.self" = "I {opinion} that I am responsible for this situation."
"accountability.other" = "I {opinion} that someone else is responsible for this situation."
"accountability.intentionality" = "I {opinion} that this situation was caused intentionally."
"accountability.fairness" = "I {opinion} that this situation is fair and deserved."



[templates.positive-level]
user = """Instruction: Imagine you are the person who wrote the following story. Read it carefully and internalize the feelings and situation described. You have just finished experiencing these events. Answer the following reflection based on how you truly feel in that moment.
My Situation: {scenario} {appraisals}
Question: How positive did this situation make you feel?
Options:
- Not at all positive
- Very slightly positive
- Slightly positive
- Moderately positive
- Quite a bit positive
- Very positive
- Extremely positive
Constraint: Respond only with one of the above labels. Do not provide any introductory text, explanation, or punctuation.
My Answer:"""

[templates.negative-level]
user = """Instruction: Imagine you are the person who wrote the following story. Read it carefully and internalize the feelings and situation described. You have just finished experiencing these events. Answer the following reflection based on how you truly feel in that moment.
My Situation: {scenario} {appraisals}
Question: How negative did this situation make you feel?
Options:
- Not at all negative
- Very slightly negative
- Slightly negative
- Moderately negative
- Quite a bit negative
- Very negative
- Extremely negative
Constraint: Respond only with one of the above labels. Do not provide any introductory text, explanation, or punctuation.
My Answer:"""

[templates.positive-labels]
user = """Instruction: Imagine you are the person who wrote the following story. Read it carefully and internalize the feelings and situation described. You have just finished experiencing these events. Answer the following reflection based on how you truly feel in that moment.
My Situation: {scenario} {appraisals}
Question: Which of the following emotion groups did you experience in this situation?
Options:
- Hopeful, optimistic, encouraged
- Grateful, appreciative, thankful
- Glad, happy, joyful
- Love, closeness, trust
- Amused, entertained
- Sympathy, concern, compassion
- Inspiration, admiration, appreciation
- Calm, peaceful, relaxed
- Proud, confident, determined
- Excited, enthusiastic, elated
Constraint:
1. If you did not feel any positive emotions, respond only with "None".
2. If you experienced any of the above, list all applicable groups exactly as they are written, separated by a semicolon (;).
3. Do not provide any introductory text, explanation, or punctuation outside of the list.
My Answer:"""

[templates.negative-labels]
user = """Instruction: Imagine you are the person who wrote the following story. Read it carefully and internalize the feelings and situation described. You have just finished experiencing these events. Answer the following reflection based on how you truly feel in that moment.
My Situation: {scenario} {appraisals}
Question: Which of the following emotion groups did you experience in this situation?
Options:
- Angry, frustrated, annoyed
- Worried, nervous, fearful
- Sad, downhearted, unhappy
- Disgust, distaste, revulsion
- Despair, hopelessness, sorrow
- Ashamed, humiliated, embarrassed
- Lonely, isolated, disconnected from others
- Panicked, alarmed, freaked out
- Guilty, blameworthy, repentant
- Confused, disoriented, surprised
Constraint:
1. If you did not feel any negative emotions, respond only with "None".
2. If you experienced any of the above, list all applicable groups exactly as they are written, separated by a semicolon (;).
3. Do not provide any introductory text, explanation, or punctuation outside of the list.
My Answer:"""

 

[label_maps.positive-level]
"Not at all positive" = 0
"Very slightly positive" = 1
"Slightly positive" = 2
"Moderately positive" = 3
"Quite a bit positive" = 4
"Very positive" = 5
"Extremely positive" = 6

