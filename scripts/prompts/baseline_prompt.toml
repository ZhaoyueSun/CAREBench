[templates.core-appraisals]
user = """Instruction: Imagine you are the person who wrote the following story. Read it carefully and internalize the feelings and situation described. Please answer the following questions in the first person. When answering, please think back to the moment when the events described in the story had just ended. Keep your response concise and try to keep it within 60 tokens.
My Situation: {scenario}
Question: {question}
My Answer:"""

[core-appraisals.questions]
"relevance" = "When the event happened, how much did it matter to you? Why?"
"congruence" = "In what ways did this situation help or hurt you?"
"accountability" = "Who or what did you feel was most responsible for all of this?"
"control" = "Did you feel like you were in control? Why?"
"certainty" = "Did things go as you expected? If not, what was unexpected?"

